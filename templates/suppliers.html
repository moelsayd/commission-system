{% extends "base.html" %}
{% block title %}الموردين{% endblock %}
{% block page_title %}الموردين{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <input type="text" id="searchInput" placeholder="بحث..." class="search-input" oninput="loadSuppliers()">
        <button class="btn btn-primary" onclick="openSupplierModal()">➕ إضافة مورد</button>
    </div>
    <div id="suppliersTable"></div>
    <div id="pagination" class="pagination"></div>
</div>
<div id="supplierModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">إضافة مورد</h3>
        <form id="supplierForm">
            <input type="hidden" id="supplierId">
            <div class="form-group"><label>الاسم *</label><input type="text" id="supName" required></div>
            <div class="form-group"><label>الهاتف</label><input type="text" id="supPhone"></div>
            <div class="form-group"><label>البريد</label><input type="email" id="supEmail"></div>
            <div class="form-group"><label>العنوان</label><textarea id="supAddress" rows="2"></textarea></div>
            <div class="form-group"><label>ملاحظات</label><textarea id="supNotes" rows="2"></textarea></div>
            <div class="error-message" id="formErrors"></div>
            <button type="submit" class="btn btn-success">حفظ</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1, perPage = 20;

window.editItem = async function(id) { openSupplierModal(id); };
window.deleteItem = async function(id) {
    if (!confirm('حذف المورد؟')) return;
    try {
        await API.del(`/api/suppliers/${id}`);
        loadSuppliers(currentPage);
        showToast('تم الحذف');
    } catch(e) { showToast(e.message, 'error'); }
};

async function loadSuppliers(page=1) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    try {
        const res = await API.get('/api/suppliers', {page, per_page:perPage, search});
        const cols = [
            {key:'name', label:'الاسم'},
            {key:'phone', label:'الهاتف'},
            {key:'email', label:'البريد'}
        ];
        renderTable('suppliersTable', cols, res.data, res.total, page, perPage, loadSuppliers);
    } catch(e) { showToast(e.message, 'error'); }
}

function openSupplierModal(editId=null) {
    document.getElementById('supplierForm').reset();
    document.getElementById('supplierId').value = '';
    document.getElementById('modalTitle').textContent = 'إضافة مورد';
    document.getElementById('formErrors').innerHTML = '';
    if (editId) {
        document.getElementById('modalTitle').textContent = 'تعديل مورد';
        document.getElementById('supplierId').value = editId;
        API.get(`/api/suppliers/${editId}`).then(s => {
            document.getElementById('supName').value = s.name;
            document.getElementById('supPhone').value = s.phone || '';
            document.getElementById('supEmail').value = s.email || '';
            document.getElementById('supAddress').value = s.address || '';
            document.getElementById('supNotes').value = s.notes || '';
        });
    }
    openModal('supplierModal');
}

document.getElementById('supplierForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('supplierId').value;
    const data = {
        name: document.getElementById('supName').value,
        phone: document.getElementById('supPhone').value,
        email: document.getElementById('supEmail').value,
        address: document.getElementById('supAddress').value,
        notes: document.getElementById('supNotes').value
    };
    try {
        if (id) await API.put(`/api/suppliers/${id}`, data);
        else await API.post('/api/suppliers', data);
        closeModal();
        loadSuppliers(currentPage);
        showToast('تم الحفظ');
    } catch(err) { document.getElementById('formErrors').textContent = err.message; }
});

document.addEventListener('DOMContentLoaded', () => loadSuppliers());
</script>
{% endblock %}
