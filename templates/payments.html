{% extends "base.html" %}
{% block title %}المدفوعات{% endblock %}
{% block page_title %}المدفوعات{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header" style="gap:1rem;">
        <button class="btn btn-primary" onclick="switchTab('customer')">مدفوعات العملاء</button>
        <button class="btn btn-outline" onclick="switchTab('supplier')">مدفوعات الموردين</button>
        <button class="btn btn-success" onclick="openPaymentModal('customer')">➕ دفعة عميل</button>
        <button class="btn btn-success" onclick="openPaymentModal('supplier')">➕ دفعة مورد</button>
    </div>
    <div id="paymentsContent"></div>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3>تسجيل دفعة</h3>
        <form id="paymentForm">
            <input type="hidden" id="payType">
            <div class="form-group"><label id="orderOrSupplierLabel">الطلب</label><select id="payEntity" required></select></div>
            <div class="form-group"><label>المبلغ *</label><input type="number" step="0.01" id="payAmount" required></div>
            <div class="form-group"><label>التاريخ</label><input type="date" id="payDate"></div>
            <div class="error-message" id="formErrors"></div>
            <button type="submit" class="btn btn-success">حفظ</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentTab = 'customer';

async function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.card-header > button.btn-primary, .card-header > button.btn-outline').forEach(b => b.className = 'btn btn-outline');
    document.querySelector(`.card-header button:first-child`).className = 'btn btn-primary';
    if (tab === 'customer') await loadCustomerPayments();
    else await loadSupplierPayments();
}

async function loadCustomerPayments() {
    try {
        const res = await API.get('/api/customer-payments');
        const cols = [
            {key:'order_id', label:'طلب رقم'},
            {key:'amount', label:'المبلغ'},
            {key:'payment_date', label:'التاريخ', render: r => r.payment_date?.slice(0,10)}
        ];
        document.getElementById('paymentsContent').innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.innerHTML = `<h4>مدفوعات العملاء</h4><div id="custPayTable"></div>`;
        document.getElementById('paymentsContent').appendChild(wrapper);
        renderTable('custPayTable', cols, res, res.length, 1, 100, ()=>{}, (row) => `
            <button class="btn btn-danger btn-sm" data-action="delete" data-id="${row.id}">🗑️</button>
        `);
        window.deleteItem = async function(id) {
            if (!confirm('حذف الدفعة؟')) return;
            await API.del(`/api/customer-payments/${id}`);
            loadCustomerPayments();
            showToast('تم الحذف');
        };
    } catch(e) { showToast(e.message, 'error'); }
}

async function loadSupplierPayments() {
    try {
        const res = await API.get('/api/supplier-payments');
        const cols = [
            {key:'supplier_id', label:'مورد رقم'},
            {key:'amount', label:'المبلغ'},
            {key:'payment_date', label:'التاريخ', render: r => r.payment_date?.slice(0,10)}
        ];
        document.getElementById('paymentsContent').innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.innerHTML = `<h4>مدفوعات الموردين</h4><div id="suppPayTable"></div>`;
        document.getElementById('paymentsContent').appendChild(wrapper);
        renderTable('suppPayTable', cols, res, res.length, 1, 100, ()=>{}, (row) => `
            <button class="btn btn-danger btn-sm" data-action="delete" data-id="${row.id}">🗑️</button>
        `);
        window.deleteItem = async function(id) {
            if (!confirm('حذف الدفعة؟')) return;
            await API.del(`/api/supplier-payments/${id}`);
            loadSupplierPayments();
            showToast('تم الحذف');
        };
    } catch(e) { showToast(e.message, 'error'); }
}

async function openPaymentModal(type) {
    document.getElementById('paymentForm').reset();
    document.getElementById('formErrors').innerHTML = '';
    document.getElementById('payType').value = type;
    const entitySelect = document.getElementById('payEntity');
    if (type === 'customer') {
        document.getElementById('orderOrSupplierLabel').textContent = 'الطلب';
        const orders = await API.get('/api/orders', {per_page:1000});
        entitySelect.innerHTML = '<option value="">اختر طلب</option>' + orders.data.map(o => `<option value="${o.id}">طلب #${o.id} - ${o.customer_name} (متبقي ${o.remaining})</option>`).join('');
    } else {
        document.getElementById('orderOrSupplierLabel').textContent = 'المورد';
        const supps = await API.get('/api/suppliers', {per_page:1000});
        entitySelect.innerHTML = '<option value="">اختر مورد</option>' + supps.data.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    }
    openModal('paymentModal');
}

document.getElementById('paymentForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const type = document.getElementById('payType').value;
    const entityId = document.getElementById('payEntity').value;
    const amount = document.getElementById('payAmount').value;
    const date = document.getElementById('payDate').value;
    if (!entityId || !amount) { document.getElementById('formErrors').textContent = 'أكمل البيانات'; return; }
    try {
        if (type === 'customer') {
            await API.post('/api/customer-payments', {order_id: entityId, amount, payment_date: date});
        } else {
            await API.post('/api/supplier-payments', {supplier_id: entityId, amount, payment_date: date});
        }
        closeModal();
        switchTab(currentTab);
        showToast('تم التسجيل');
    } catch(err) { document.getElementById('formErrors').textContent = err.message; }
});

document.addEventListener('DOMContentLoaded', () => switchTab('customer'));
</script>
{% endblock %}
