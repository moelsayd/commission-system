{% extends "base.html" %}
{% block title %}العملاء{% endblock %}
{% block page_title %}العملاء{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <input type="text" id="searchInput" placeholder="بحث..." class="search-input" oninput="loadCustomers()">
        <button class="btn btn-primary" onclick="openCustomerModal()">➕ إضافة عميل</button>
    </div>
    <div id="customersTable"></div>
    <div id="pagination" class="pagination"></div>
</div>
<div id="customerModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">إضافة عميل</h3>
        <form id="customerForm">
            <input type="hidden" id="customerId">
            <div class="form-group"><label>الاسم *</label><input type="text" id="custName" required></div>
            <div class="form-group"><label>الهاتف</label><input type="text" id="custPhone"></div>
            <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="custEmail"></div>
            <div class="form-group"><label>العنوان</label><textarea id="custAddress" rows="2"></textarea></div>
            <div class="form-group"><label>ملاحظات</label><textarea id="custNotes" rows="2"></textarea></div>
            <div class="error-message" id="formErrors"></div>
            <button type="submit" class="btn btn-success">حفظ</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1, perPage = 20;

window.editItem = async function(id) { openCustomerModal(id); };
window.deleteItem = async function(id) {
    if (!confirm('هل أنت متأكد من حذف العميل؟')) return;
    try {
        await API.del(`/api/customers/${id}`);
        loadCustomers(currentPage);
        showToast('تم الحذف');
    } catch(e) { showToast(e.message, 'error'); }
};

async function loadCustomers(page=1) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    try {
        const res = await API.get('/api/customers', {page, per_page:perPage, search});
        const cols = [
            {key:'name', label:'الاسم'},
            {key:'phone', label:'الهاتف'},
            {key:'email', label:'البريد'},
            {key:'created_at', label:'تاريخ الإنشاء', render: r => r.created_at ? r.created_at.slice(0,10) : ''}
        ];
        renderTable('customersTable', cols, res.data, res.total, page, perPage, loadCustomers);
    } catch(e) { showToast(e.message, 'error'); }
}

function openCustomerModal(editId=null) {
    document.getElementById('customerForm').reset();
    document.getElementById('customerId').value = '';
    document.getElementById('modalTitle').textContent = 'إضافة عميل';
    document.getElementById('formErrors').innerHTML = '';
    if (editId) {
        document.getElementById('modalTitle').textContent = 'تعديل عميل';
        document.getElementById('customerId').value = editId;
        API.get(`/api/customers/${editId}`).then(c => {
            document.getElementById('custName').value = c.name;
            document.getElementById('custPhone').value = c.phone || '';
            document.getElementById('custEmail').value = c.email || '';
            document.getElementById('custAddress').value = c.address || '';
            document.getElementById('custNotes').value = c.notes || '';
        });
    }
    openModal('customerModal');
}

document.getElementById('customerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('customerId').value;
    const data = {
        name: document.getElementById('custName').value,
        phone: document.getElementById('custPhone').value,
        email: document.getElementById('custEmail').value,
        address: document.getElementById('custAddress').value,
        notes: document.getElementById('custNotes').value
    };
    try {
        if (id) await API.put(`/api/customers/${id}`, data);
        else await API.post('/api/customers', data);
        closeModal();
        loadCustomers(currentPage);
        showToast('تم الحفظ');
    } catch(err) { document.getElementById('formErrors').textContent = err.message; }
});

document.addEventListener('DOMContentLoaded', () => loadCustomers());
</script>
{% endblock %}
