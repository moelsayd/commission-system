{% extends "base.html" %}
{% block title %}المشتريات{% endblock %}
{% block page_title %}المشتريات{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <input type="text" id="searchInput" placeholder="بحث..." class="search-input" oninput="loadPurchases()">
        <button class="btn btn-primary" onclick="openPurchaseModal()">➕ إضافة مشتريات</button>
    </div>
    <div id="purchasesTable"></div>
    <div id="pagination" class="pagination"></div>
</div>
<div id="purchaseModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3>إضافة مشتريات</h3>
        <form id="purchaseForm">
            <div class="form-group"><label>المورد *</label><select id="purSupplier" required></select></div>
            <div class="form-group"><label>المنتج *</label><select id="purProduct" required></select></div>
            <div class="form-group"><label>الكمية *</label><input type="number" id="purQty" required min="1"></div>
            <div class="form-group"><label>سعر الشراء *</label><input type="number" step="0.01" id="purPrice" required></div>
            <div class="error-message" id="formErrors"></div>
            <button type="submit" class="btn btn-success">حفظ</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1, perPage = 20;

window.deleteItem = async function(id) {
    if (!confirm('حذف المشتريات؟')) return;
    try {
        await API.del(`/api/purchases/${id}`);
        loadPurchases(currentPage);
        showToast('تم الحذف');
    } catch(e) { showToast(e.message, 'error'); }
};

async function loadPurchases(page=1) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    try {
        const res = await API.get('/api/purchases', {page, per_page:perPage, search});
        const cols = [
            {key:'supplier_name', label:'المورد'},
            {key:'product_name', label:'المنتج'},
            {key:'quantity', label:'الكمية'},
            {key:'buy_price', label:'سعر الشراء'},
            {key:'purchase_date', label:'التاريخ', render: r => r.purchase_date?.slice(0,10)}
        ];
        renderTable('purchasesTable', cols, res.data, res.total, page, perPage, loadPurchases, (row) => `
            <button class="btn btn-danger btn-sm" data-action="delete" data-id="${row.id}">🗑️</button>
        `);
    } catch(e) { showToast(e.message, 'error'); }
}

async function openPurchaseModal() {
    document.getElementById('purchaseForm').reset();
    document.getElementById('formErrors').innerHTML = '';
    const suppRes = await API.get('/api/suppliers', {per_page:1000});
    const prodRes = await API.get('/api/products', {per_page:1000});
    document.getElementById('purSupplier').innerHTML = '<option value="">اختر</option>' + suppRes.data.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    document.getElementById('purProduct').innerHTML = '<option value="">اختر</option>' + prodRes.data.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    openModal('purchaseModal');
}

document.getElementById('purchaseForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        supplier_id: document.getElementById('purSupplier').value,
        product_id: document.getElementById('purProduct').value,
        quantity: document.getElementById('purQty').value,
        buy_price: document.getElementById('purPrice').value
    };
    try {
        await API.post('/api/purchases', data);
        closeModal();
        loadPurchases(currentPage);
        showToast('تمت الإضافة');
    } catch(err) { document.getElementById('formErrors').textContent = err.message; }
});

document.addEventListener('DOMContentLoaded', () => loadPurchases());
</script>
{% endblock %}
