{% extends "base.html" %}
{% block title %}الطلبات{% endblock %}
{% block page_title %}الطلبات{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <div>
            <input type="text" id="searchOrders" placeholder="بحث..." class="search-input" oninput="loadOrders()">
            <select id="statusFilter" onchange="loadOrders()">
                <option value="">كل الحالات</option>
                <option value="pending">معلق</option>
                <option value="shipping">شحن</option>
                <option value="delivered">تم التسليم</option>
                <option value="cancelled">ملغي</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="openOrderModal()">➕ طلب جديد</button>
    </div>
    <div id="ordersTable"></div>
    <div id="pagination" class="pagination"></div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">طلب جديد</h3>
        <form id="orderForm">
            <input type="hidden" id="orderId">
            <div class="form-group"><label>العميل *</label><select id="orderCustomer" required></select></div>
            <div class="form-group"><label>نسبة العمولة %</label><input type="number" id="commissionPercent" value="0" step="0.01" min="0" max="100" oninput="calcCommission()"></div>
            <div class="form-group">
                <label>المنتجات</label>
                <table id="itemsTable">
                    <thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>إجمالي</th><th></th></tr></thead>
                    <tbody></tbody>
                </table>
                <button type="button" class="btn btn-outline" onclick="addItemRow()">➕ إضافة منتج</button>
            </div>
            <div class="form-group"><label>الإجمالي: <span id="orderTotal">0</span> ج</label><label>العمولة: <span id="orderCommission">0</span> ج</label></div>
            <div class="form-group"><label>ملاحظات</label><textarea id="orderNotes" rows="2"></textarea></div>
            <div class="error-message" id="orderErrors"></div>
            <button type="submit" class="btn btn-success">حفظ</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1, perPage = 20;

window.editItem = async function(id) { openOrderModal(id); };
window.deleteItem = async function(id) {
    if (!confirm('حذف الطلب؟')) return;
    try {
        await API.del(`/api/orders/${id}`);
        loadOrders(currentPage);
        showToast('تم الحذف');
    } catch(e) { showToast(e.message, 'error'); }
};

// دالة مخصصة للتعامل مع status
window.handleAction_status = function(orderId, btn) {
    const old = document.querySelector('.status-popup');
    if (old) old.remove();
    const popup = document.createElement('div');
    popup.className = 'status-popup';
    popup.innerHTML = `
        <button data-status="pending">معلق</button>
        <button data-status="cancelled">ملغي</button>
        <button data-status="delivered">تم التسليم</button>
    `;
    const rect = btn.getBoundingClientRect();
    popup.style.position = 'fixed';
    popup.style.top = rect.bottom + 5 + 'px';
    popup.style.left = rect.left + 'px';
    document.body.appendChild(popup);
    popup.addEventListener('click', async (e) => {
        const status = e.target.dataset.status;
        if (!status) return;
        popup.remove();
        try {
            await API.put(`/api/orders/${orderId}/status`, {status});
            loadOrders(currentPage);
            showToast('تم تغيير الحالة');
        } catch(ex) { showToast(ex.message, 'error'); }
    });
    setTimeout(() => {
        const hide = (e) => {
            if (!popup.contains(e.target)) {
                popup.remove();
                document.removeEventListener('click', hide);
            }
        };
        document.addEventListener('click', hide);
    }, 10);
};

async function loadOrders(page=1) {
    currentPage = page;
    const search = document.getElementById('searchOrders').value;
    const status = document.getElementById('statusFilter').value;
    try {
        const res = await API.get('/api/orders', {page, per_page:perPage, search, status});
        const cols = [
            {key:'customer_name', label:'العميل'},
            {key:'total_amount', label:'الإجمالي'},
            {key:'paid_amount', label:'المدفوع'},
            {key:'remaining', label:'المتبقي'},
            {key:'status', label:'الحالة', render: r => `<span class="status-badge status-${r.status}">${r.status}</span>`},
            {key:'payment_status', label:'الدفع', render: r => `<span class="payment-${r.payment_status==='مدفوع'?'paid':r.payment_status==='جزئي'?'partial':'unpaid'}">${r.payment_status}</span>`}
        ];
        renderTable('ordersTable', cols, res.data, res.total, page, perPage, loadOrders, (row) => `
            <button class="btn btn-outline btn-sm" data-action="edit" data-id="${row.id}">✏️</button>
            <button class="btn btn-danger btn-sm" data-action="delete" data-id="${row.id}">🗑️</button>
            <button class="btn btn-warning btn-sm" data-action="status" data-id="${row.id}">🔄</button>
        `);
    } catch(e) { showToast(e.message, 'error'); }
}

// دوال المودال
async function openOrderModal(editId=null) {
    document.getElementById('orderForm').reset();
    document.getElementById('orderId').value = '';
    document.getElementById('itemsTable').querySelector('tbody').innerHTML = '';
    document.getElementById('orderTotal').textContent = '0';
    document.getElementById('orderCommission').textContent = '0';
    document.getElementById('modalTitle').textContent = 'طلب جديد';
    document.getElementById('orderErrors').innerHTML = '';
    const custRes = await API.get('/api/customers', {per_page:1000});
    const sel = document.getElementById('orderCustomer');
    sel.innerHTML = '<option value="">اختر عميل</option>' + custRes.data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    if (editId) {
        document.getElementById('modalTitle').textContent = 'تعديل طلب';
        document.getElementById('orderId').value = editId;
        const orderRes = await API.get(`/api/orders/${editId}`);
        document.getElementById('orderCustomer').value = orderRes.order.customer_id;
        document.getElementById('commissionPercent').value = orderRes.order.commission_percent;
        document.getElementById('orderNotes').value = orderRes.order.notes || '';
        orderRes.items.forEach(item => {
            addItemRow(item.product_id, item.quantity, item.unit_price);
        });
        calcCommission();
    }
    openModal('orderModal');
}

function addItemRow(productId=null, qty=1, price=0) {
    const tbody = document.querySelector('#itemsTable tbody');
    const row = document.createElement('tr');
    row.innerHTML = `
        <td><select class="product-select" onchange="updateItemPrice(this)"></select></td>
        <td><input type="number" class="item-qty" value="${qty}" min="1" onchange="calcCommission()"></td>
        <td><input type="number" class="item-price" value="${price}" step="0.01" onchange="calcCommission()"></td>
        <td class="item-total">0</td>
        <td><button type="button" class="btn btn-danger btn-sm" onclick="this.closest('tr').remove();calcCommission()">×</button></td>
    `;
    tbody.appendChild(row);
    loadProductOptions(row.querySelector('.product-select'), productId);
}

async function loadProductOptions(selectElem, selectedId=null) {
    const res = await API.get('/api/products', {per_page:1000});
    selectElem.innerHTML = '<option value="">اختر منتج</option>' + res.data.map(p => `<option value="${p.id}" data-price="${p.sell_price}" ${p.id==selectedId?'selected':''}>${p.name} (${p.quantity} متاح)</option>`).join('');
    if (selectedId) updateItemPrice(selectElem);
}

function updateItemPrice(select) {
    const option = select.selectedOptions[0];
    const priceInput = select.closest('tr').querySelector('.item-price');
    if (option && option.dataset.price) priceInput.value = option.dataset.price;
    calcCommission();
}

function calcCommission() {
    let total = 0;
    document.querySelectorAll('#itemsTable tbody tr').forEach(row => {
        const qty = parseFloat(row.querySelector('.item-qty')?.value) || 0;
        const price = parseFloat(row.querySelector('.item-price')?.value) || 0;
        const rowTotal = qty * price;
        row.querySelector('.item-total').textContent = rowTotal.toFixed(2);
        total += rowTotal;
    });
    document.getElementById('orderTotal').textContent = total.toFixed(2);
    const percent = parseFloat(document.getElementById('commissionPercent').value) || 0;
    document.getElementById('orderCommission').textContent = (total * percent / 100).toFixed(2);
}

document.getElementById('orderForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const customerId = document.getElementById('orderCustomer').value;
    const items = [];
    document.querySelectorAll('#itemsTable tbody tr').forEach(row => {
        const productId = row.querySelector('.product-select').value;
        const quantity = parseInt(row.querySelector('.item-qty').value) || 0;
        const unitPrice = parseFloat(row.querySelector('.item-price').value) || 0;
        if (productId && quantity > 0) items.push({product_id: parseInt(productId), quantity, unit_price: unitPrice});
    });
    if (!customerId || items.length===0) {
        document.getElementById('orderErrors').textContent = 'اختر عميل وأضف منتجات';
        return;
    }
    const data = {
        customer_id: parseInt(customerId),
        commission_percent: parseFloat(document.getElementById('commissionPercent').value) || 0,
        items,
        notes: document.getElementById('orderNotes').value
    };
    try {
        const orderId = document.getElementById('orderId').value;
        if (orderId) await API.put(`/api/orders/${orderId}`, data);
        else await API.post('/api/orders', data);
        closeModal();
        loadOrders(currentPage);
        showToast('تم الحفظ');
    } catch(err) { document.getElementById('orderErrors').textContent = err.message; }
});

document.addEventListener('DOMContentLoaded', () => loadOrders());
</script>
{% endblock %}
