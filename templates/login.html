<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام العمولة</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display:flex; align-items:center; justify-content:center; height:100vh; background:var(--bg);">
    <div class="card" style="width:360px;">
        <h3 style="text-align:center; margin-bottom:1.5rem;">تسجيل الدخول</h3>
        <form method="POST">
            <div class="form-group"><label>اسم المستخدم</label><input type="text" name="username" required></div>
            <div class="form-group"><label>كلمة المرور</label><input type="password" name="password" required></div>
            {% if error %}<div class="error-message">{{ error }}</div>{% endif %}
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">دخول</button>
        </form>
    </div>
</body>
</html>
