{% extends "base.html" %}
{% block title %}الإعدادات{% endblock %}
{% block page_title %}الإعدادات{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;">
    <h3>تغيير كلمة المرور</h3>
    <form id="settingsForm">
        <div class="form-group"><label>كلمة المرور الحالية</label><input type="password" id="currentPass" required></div>
        <div class="form-group"><label>كلمة المرور الجديدة</label><input type="password" id="newPass" required></div>
        <div class="error-message" id="formErrors"></div>
        <button type="submit" class="btn btn-success">حفظ</button>
    </form>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('settingsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        current_password: document.getElementById('currentPass').value,
        new_password: document.getElementById('newPass').value
    };
    try {
        await API.post('/api/change-password', data);
        showToast('تم تغيير كلمة المرور');
        document.getElementById('settingsForm').reset();
    } catch(err) { document.getElementById('formErrors').textContent = err.message; }
});
</script>
{% endblock %}
