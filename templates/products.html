{% extends "base.html" %}
{% block title %}المنتجات{% endblock %}
{% block page_title %}المنتجات{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <input type="text" id="searchInput" placeholder="بحث..." class="search-input" oninput="loadProducts()">
        <button class="btn btn-primary" onclick="openProductModal()">➕ إضافة منتج</button>
    </div>
    <div id="productsTable"></div>
    <div id="pagination" class="pagination"></div>
</div>
<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">إضافة منتج</h3>
        <form id="productForm">
            <input type="hidden" id="productId">
            <div class="form-group"><label>الاسم *</label><input type="text" id="prodName" required></div>
            <div class="form-group"><label>الوصف</label><textarea id="prodDesc" rows="2"></textarea></div>
            <div class="form-group"><label>سعر الشراء *</label><input type="number" step="0.01" id="prodBuyPrice" required></div>
            <div class="form-group"><label>سعر البيع *</label><input type="number" step="0.01" id="prodSellPrice" required></div>
            <div class="form-group"><label>الكمية</label><input type="number" id="prodQuantity" value="0"></div>
            <div class="error-message" id="formErrors"></div>
            <button type="submit" class="btn btn-success">حفظ</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1, perPage = 20;

window.editItem = async function(id) { openProductModal(id); };
window.deleteItem = async function(id) {
    if (!confirm('هل أنت متأكد من حذف المنتج؟')) return;
    try {
        await API.del(`/api/products/${id}`);
        loadProducts(currentPage);
        showToast('تم الحذف');
    } catch(e) { showToast(e.message, 'error'); }
};

async function loadProducts(page=1) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    try {
        const res = await API.get('/api/products', {page, per_page:perPage, search});
        const cols = [
            {key:'name', label:'المنتج'},
            {key:'buy_price', label:'سعر الشراء'},
            {key:'sell_price', label:'سعر البيع'},
            {key:'quantity', label:'الكمية'}
        ];
        renderTable('productsTable', cols, res.data, res.total, page, perPage, loadProducts);
    } catch(e) { showToast(e.message, 'error'); }
}

function openProductModal(editId=null) {
    document.getElementById('productForm').reset();
    document.getElementById('productId').value = '';
    document.getElementById('modalTitle').textContent = 'إضافة منتج';
    document.getElementById('formErrors').innerHTML = '';
    if (editId) {
        document.getElementById('modalTitle').textContent = 'تعديل منتج';
        document.getElementById('productId').value = editId;
        API.get(`/api/products/${editId}`).then(p => {
            document.getElementById('prodName').value = p.name;
            document.getElementById('prodDesc').value = p.description || '';
            document.getElementById('prodBuyPrice').value = p.buy_price;
            document.getElementById('prodSellPrice').value = p.sell_price;
            document.getElementById('prodQuantity').value = p.quantity;
        });
    }
    openModal('productModal');
}

document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('productId').value;
    const data = {
        name: document.getElementById('prodName').value,
        description: document.getElementById('prodDesc').value,
        buy_price: document.getElementById('prodBuyPrice').value,
        sell_price: document.getElementById('prodSellPrice').value,
        quantity: document.getElementById('prodQuantity').value
    };
    try {
        if (id) await API.put(`/api/products/${id}`, data);
        else await API.post('/api/products', data);
        closeModal();
        loadProducts(currentPage);
        showToast('تم الحفظ');
    } catch(err) { document.getElementById('formErrors').textContent = err.message; }
});

document.addEventListener('DOMContentLoaded', () => loadProducts());
</script>
{% endblock %}
